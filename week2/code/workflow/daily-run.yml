# Spec: week2/specs/ci.md · Week 2 · N7 · B 路产出
# 放到 .github/workflows/daily-run.yml · 记得先 commit pipeline.py
#
# 改这份 workflow 前先 /opsx:verify · 保持 spec 同步

name: daily-run

on:
  schedule:
    - cron: '0 0 * * *'          # 每天 UTC 0:00
  workflow_dispatch:             # 允许手动触发

concurrency:
  group: daily-run-${{ github.event_name }}
  cancel-in-progress: false      # 同 schedule 串行 · 不取消在跑的

jobs:
  run:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline --date $(date -u +%Y-%m-%d)

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: knowledge/logs/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ daily-run failed · run $GITHUB_RUN_ID\"}" \
            "$SLACK_WEBHOOK"
